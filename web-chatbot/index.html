<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 3.5 Multiline</title>
    <style>
        :root {
            --bg: #131314;
            --sidebar: #1e1f20;
            --text: #e3e3e3;
            --accent: #4e4feb;
            --ai-msg: #282a2d;
            --input-bg: #202124;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            white-space: pre-wrap;
            /* Preserves newlines in AI response */
        }

        .message {
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
        }

        .user {
            background: #303134;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .ai {
            background: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-meta {
            font-size: 0.75rem;
            color: #9aa0a6;
            margin-top: 8px;
            display: block;
            text-align: right;
        }

        #status-area {
            padding: 0 20px 10px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #8ab4f8;
        }

        /* Multiline Input Styling */
        #input-area {
            padding: 20px;
            background: var(--bg);
        }

        .input-box {
            display: flex;
            background: var(--input-bg);
            border: 1px solid #3c4043;
            border-radius: 24px;
            padding: 10px 15px;
            align-items: flex-end;
            /* Keeps button at bottom for long texts */
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            outline: none;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            /* Max height before scrolling */
            line-height: 1.5;
            font-family: inherit;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            height: 40px;
        }

        button:disabled {
            background: #3c4043;
            opacity: 0.6;
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 5px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <div id="chat-box">
            <div class="message ai">Qwen 3.5 Multiline Ready. (Shift+Enter for new line)</div>
        </div>

        <div id="status-area">
            <span>Thinking... <b id="live-timer">0.0</b>s</span>
        </div>

        <div id="input-area">
            <div class="input-box">
                <textarea id="user-input" rows="1" placeholder="Ask Qwen 3.5..." autocomplete="off"></textarea>
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusArea = document.getElementById('status-area');
        const liveTimer = document.getElementById('live-timer');
        let timerInterval;

        // --- 1. Auto-resize logic ---
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // --- 2. Key Binding logic (Enter vs Shift+Enter) ---
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevents adding a new line
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // UI Reset
            userInput.value = '';
            userInput.style.height = 'auto'; // Reset height
            userInput.disabled = true;
            appendMessage('user', text);

            statusArea.style.display = 'flex';
            let startTime = performance.now();
            timerInterval = setInterval(() => {
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                liveTimer.innerText = elapsed;
            }, 100);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                const totalTime = ((performance.now() - startTime) / 1000).toFixed(2);
                appendMessage('ai', data.message.content, totalTime);
            } catch (e) {
                appendMessage('ai', "Error: Could not reach the AI server.");
            } finally {
                clearInterval(timerInterval);
                statusArea.style.display = 'none';
                userInput.disabled = false;
                userInput.focus();
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function appendMessage(role, text, time = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            let content = `<div>${text}</div>`;
            if (time) content += `<span class="msg-meta">Generated in ${time}s</span>`;
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>

</html>
