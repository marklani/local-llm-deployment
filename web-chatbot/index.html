<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chatbot Interface</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --sidebar: #161b22;
            --text: #c9d1d9;
            --accent: #238636;
            --ai-msg: #161b22;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 6px;
            max-width: 90%;
            line-height: 1.6;
            border: 1px solid var(--border);
            position: relative;
        }

        .user {
            background: #21262d;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai {
            background: var(--ai-msg);
            align-self: flex-start;
        }

        /* --- Code Block & Copy Button Styling --- */
        .code-container {
            position: relative;
            margin: 15px 0;
        }

        pre {
            background: #000 !important;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #444;
            margin: 0;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #30363d;
            color: #8b949e;
            border: 1px solid #444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #444;
            color: #fff;
        }

        .copy-btn.copied {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Input Area */
        #input-area {
            padding: 20px;
        }

        .input-box {
            display: flex;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            outline: none;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
        }

        button#send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
        }

        #status-area {
            padding: 0 20px 10px;
            display: none;
            color: #58a6ff;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <div id="chat-box">
            <div class="message ai">Local chatbot ready. Try asking for a Python script!</div>
        </div>
        <div id="status-area">Thinking... <b id="live-timer">0.0</b>s</div>
        <div id="input-area">
            <div class="input-box">
                <textarea id="user-input" rows="1" placeholder="Type your message..."></textarea>
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusArea = document.getElementById('status-area');
        const liveTimer = document.getElementById('live-timer');

        marked.setOptions({
            highlight: function (code, lang) {
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            appendMessage('user', text);

            statusArea.style.display = 'block';
            let startTime = performance.now();
            let timerInterval = setInterval(() => {
                liveTimer.innerText = ((performance.now() - startTime) / 1000).toFixed(1);
            }, 100);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                appendMessage('ai', data.message.content, ((performance.now() - startTime) / 1000).toFixed(2));
            } catch (e) {
                appendMessage('ai', "Error connecting to backend.");
            } finally {
                clearInterval(timerInterval);
                statusArea.style.display = 'none';
            }
        }

        function appendMessage(role, text, time = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            // Parse Markdown
            let htmlContent = marked.parse(text);

            // Wrap <pre> tags in our container and add the button
            htmlContent = htmlContent.replace(/<pre>/g, '<div class="code-container"><button class="copy-btn" onclick="copyCode(this)">Copy</button><pre>').replace(/<\/pre>/g, '</pre></div>');

            let meta = time ? `<span style="font-size:0.7rem; color:#8b949e; display:block; margin-top:10px;">⏱️ ${time}s</span>` : "";
            div.innerHTML = `<div>${htmlContent}</div>${meta}`;

            chatBox.appendChild(div);

            div.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- Clipboard Function ---
        async function copyCode(btn) {
            const code = btn.parentElement.querySelector('code').innerText;
            try {
                await navigator.clipboard.writeText(code);
                btn.innerText = "Copied!";
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.innerText = "Copy";
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }
    </script>
</body>

</html>
