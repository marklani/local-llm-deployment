<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Local Gemini</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #333;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai {
            background: #0056b3;
            align-self: flex-start;
        }

        #input-area {
            padding: 20px;
            background: #1e1e1e;
            display: flex;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            // Add user message to UI
            chatBox.innerHTML += `<div class="message user">${input.value}</div>`;
            const prompt = input.value;
            input.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: prompt, model: 'llama3' }) // Replace with your model
            });

            const data = await response.json();
            chatBox.innerHTML += `<div class="message ai">${data.message.content}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>

</html>
