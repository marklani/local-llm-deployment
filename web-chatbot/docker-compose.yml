services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile_ollama
      args:
        - MODEL_NAME=${MODEL_NAME}
    container_name: ollama
    networks:
      - chatbot-network

  localhost-chatbot:
    build:
      context: .
      dockerfile: Dockerfile_app
    container_name: web-assistant
    ports:
      - "8000:8000"
    networks:
      - chatbot-network
    environment:
      - MODEL_NAME=$MODEL_NAME
    command: ["--model", "$MODEL_NAME"]
    depends_on:
      - ollama

networks:
  chatbot-network:
    name: chatbot-network